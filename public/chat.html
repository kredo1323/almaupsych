<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Чат — AlmauPsych</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .appt-chips { display:flex; gap:.5rem; flex-wrap:wrap; padding:.75rem 1rem; background:var(--gray-50); border-bottom:1px solid var(--gray-200); }
    .appt-chip { display:flex; align-items:center; gap:.4rem; background:white; border:1px solid var(--gray-200); border-radius:8px; padding:.3rem .75rem; font-size:.78rem; }
    .appt-chip .chip-date { font-weight:700; color:var(--blue-dark); }
    .appt-chip .chip-time { color:var(--text-muted); }
    .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:2rem; color:var(--text-muted); }
    .empty-chat .icon { font-size:3rem; margin-bottom:1rem; }

    /* File upload button */
    .attach-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.25rem; padding: .5rem;
      border-radius: 8px; transition: color .2s, background .2s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .attach-btn:hover { color: var(--plum-500); background: var(--gray-100); }

    /* Image messages */
    .msg-image { max-width: 220px; border-radius: 12px; cursor: pointer; display: block; }
    .msg-image:hover { opacity: .9; }

    /* Image lightbox */
    #img-lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 9999; align-items: center; justify-content: center;
    }
    #img-lightbox.open { display: flex; }
    #img-lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
    #img-lightbox-close {
      position: fixed; top: 1rem; right: 1.25rem; color: white;
      font-size: 2rem; cursor: pointer; background: none; border: none; z-index: 10000;
    }
  </style>
</head>
<body>
<!-- Image lightbox -->
<div id="img-lightbox" onclick="closeLightbox()">
  <button id="img-lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><a href="/dashboard.html">AlmauPsych<span style="color:#e57373">.</span></a></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html"><span class="icon">🏠</span> Главная</a>
      <a href="/booking.html"><span class="icon">📅</span> Записаться</a>
      <a href="/chat.html" class="active"><span class="icon">💬</span> Чат</a>
      <a href="/profile.html"><span class="icon">👤</span> Профиль</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-info">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div>
          <div class="sidebar-user-name" id="sb-name">...</div>
          <div class="sidebar-user-role" style="color:rgba(255,255,255,.5)">Студент</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content" style="display:flex;flex-direction:column;overflow:hidden">
    <div class="main-header" style="flex-shrink:0">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div class="page-title">Чат с психологом</div>
      </div>
      <button onclick="logout()" class="btn btn-outline btn-sm">Выйти</button>
    </div>

    <div style="flex:1;overflow:hidden;display:flex;flex-direction:column" id="chat-area">
      <div class="empty-chat" id="empty-state">
        <div class="spinner"></div>
        <p>Загрузка...</p>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/mobile.js"></script>
<script src="/js/ux.js"></script>
<script>
if (!API.requireAuth('student')) {}
const user = API.getUser();
if (user) {
  document.getElementById('sb-name').textContent = user.name;
  document.getElementById('sb-avatar').textContent = getInitials(user.name);
}
function logout() { API.clearAuth(); window.location.href = '/'; }

// Clear unread badge since user is on chat page
localStorage.removeItem('chat_unread');

const socket = io({ auth: { token: API.getToken() } });
let myStudentId = null;

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function pushNotify(title, body) {
  if (!('Notification' in window)) return;
  if (document.visibilityState === 'visible') return; // already looking at it
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: '/pics/logo.png' });
  }
}

async function init() {
  const me = await API.get('/api/me');
  myStudentId = me.id;
  socket.emit('join_student_chat', myStudentId);

  const appts = await API.get('/api/appointments');

  if (!appts.length) {
    document.getElementById('chat-area').innerHTML = `
      <div class="empty-chat">
        <div class="icon">📅</div>
        <h3>Нет записей</h3>
        <p>Запишитесь к психологу чтобы открыть чат</p>
        <a href="/booking.html" class="btn btn-primary" style="margin-top:1rem">Записаться</a>
      </div>`;
    return;
  }

  document.getElementById('chat-area').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="avatar" style="width:44px;height:44px;background:var(--blue-pale);color:var(--blue-dark);font-weight:700;flex-shrink:0">П</div>
        <div class="chat-header-info">
          <div class="name">Психологический центр AlmaU</div>
          <div class="status"><span class="online-dot"></span>Психолог</div>
        </div>
      </div>
      <div class="appt-chips">
        <span style="font-size:.78rem;font-weight:600;color:var(--text-muted);align-self:center;margin-right:.25rem">Ваши записи:</span>
        ${appts.map(a => `
          <div class="appt-chip">
            <span class="chip-date">${formatDate(a.date).day} ${formatDate(a.date).month}</span>
            <span class="chip-time">${a.time}</span>
            <span class="status-badge status-${a.status}" style="padding:.1rem .5rem;font-size:.7rem">${statusLabel(a.status)}</span>
          </div>`).join('')}
      </div>
      <div class="chat-messages" id="messages" style="flex:1"></div>
      <div class="chat-input-area" style="gap:.5rem">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Прикрепить фото">📎</button>
        <textarea class="chat-input" id="chat-input" placeholder="Написать психологу..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>`;

  const msgs = await API.get(`/api/chat/${myStudentId}`);
  const el = document.getElementById('messages');
  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--text-muted);font-size:.9rem;margin:2rem">
      Здравствуйте! Напишите психологу — он ответит в рабочее время.
    </div>`;
  } else {
    msgs.forEach(m => appendMsg(m));
  }
  scrollDown();
}

function escHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendMsg(m) {
  const el = document.getElementById('messages'); if (!el) return;
  document.querySelector('#messages div[style*="text-align:center"]')?.remove();
  const isMine = m.sender_id === (user?.id || myStudentId);
  const div = document.createElement('div');
  div.className = `msg ${isMine?'sent':'received'}`;

  let content = '';
  if (m.text && m.text.startsWith('__IMG__')) {
    const src = m.text.slice(7);
    content = `<img src="${src}" class="msg-image" onclick="openLightbox('${src}')" alt="фото">`;
  } else {
    content = `<div class="msg-bubble">${escHtml(m.text)}</div>`;
  }

  div.innerHTML = `${content}<div class="msg-time">${isMine?'Вы':escHtml(m.sender_name||'')} · ${formatTime(m.created_at)}</div>`;
  el.appendChild(div);
  scrollDown();
}

function scrollDown() { const e = document.getElementById('messages'); if(e) e.scrollTop = e.scrollHeight; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }

function sendMsg() {
  const input = document.getElementById('chat-input');
  if (!input || !myStudentId) return;
  const text = input.value.trim(); if (!text) return;
  socket.emit('send_student_message', { student_id: myStudentId, text });
  input.value = '';
}

// File / image upload
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('Поддерживаются только изображения', 'error'); return;
  }
  if (file.size > 10 * 1024 * 1024) {
    showToast('Файл слишком большой (макс. 10 МБ)', 'error'); return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    // Compress image to max 800px using canvas
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      socket.emit('send_student_message', { student_id: myStudentId, text: '__IMG__' + compressed });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  // Reset so same file can be re-selected
  event.target.value = '';
}

// Lightbox
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('img-lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('img-lightbox').classList.remove('open');
}

socket.on('new_student_message', m => {
  if (m.student_id === myStudentId) {
    appendMsg(m);
    // Notify if page not focused and message is from psychologist
    if (m.sender_id !== user?.id) {
      pushNotify('AlmauPsych', '💬 Новое сообщение от психолога');
    }
  }
});

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('mob-overlay')?.classList.add('open');
}

init();
</script>
</body>
</html>
