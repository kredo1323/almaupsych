<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Главная — AlmauPsych</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .next-appt-card {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      border-radius: var(--radius); padding: 1.75rem 2rem; color: white;
      margin-bottom: 1.5rem; display: flex; align-items: center; gap: 2rem;
    }
    .next-appt-date { text-align: center; background: rgba(255,255,255,.15); border-radius: 12px; padding: 1rem 1.25rem; min-width: 72px; }
    .next-appt-date .day { font-size: 2.25rem; font-weight: 800; line-height: 1; }
    .next-appt-date .month { font-size: .78rem; opacity: .8; text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }
    .next-appt-info { flex: 1; }
    .next-appt-info h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: .35rem; }
    .next-appt-info p { opacity: .8; font-size: .95rem; }
    .appt-card-new {
      background: white; border: 1.5px solid var(--gray-200); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; margin-bottom: .75rem;
      display: flex; align-items: center; gap: 1.25rem;
      transition: all .2s;
    }
    .appt-card-new:hover { border-color: var(--blue-light); box-shadow: var(--shadow); }
    .appt-card-new .left-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
    .section-sep { font-size: .78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin: 1.5rem 0 .75rem; }
    /* mobile hamburger */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: .5rem; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); margin: 5px 0; border-radius: 2px; transition: .3s; }
    @media (max-width: 768px) {
      .hamburger { display: block; }
      .sidebar { transform: translateX(-100%); transition: transform .3s; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0 !important; }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 49; }
      .sidebar-overlay.open { display: block; }
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><a href="/dashboard.html">AlmauPsych<span style="color:#e57373">.</span></a></div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="active"><span class="icon">🏠</span> Главная</a>
      <a href="/booking.html"><span class="icon">📅</span> Записаться</a>
      <a href="/chat.html"><span class="icon">💬</span> Чат <span id="chat-badge" style="display:none;background:#e57373;color:white;border-radius:50px;padding:.1rem .45rem;font-size:.7rem;font-weight:700;margin-left:.25rem"></span></a>
      <a href="/profile.html"><span class="icon">👤</span> Профиль</a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-info">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div>
          <div class="sidebar-user-name" id="sb-name">...</div>
          <div class="sidebar-user-role" style="color:rgba(255,255,255,.5)">Студент AlmaU</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:1rem">
        <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div class="page-title" id="greeting">Добро пожаловать 👋</div>
      </div>
      <div class="header-actions">
        <a href="/booking.html" class="btn btn-primary btn-sm">+ Записаться</a>
        <button onclick="logout()" class="btn btn-outline btn-sm">Выйти</button>
      </div>
    </div>
    <div class="main-body">

      <!-- Next appointment highlight -->
      <div id="next-appt-wrap"></div>

      <!-- Stats -->
      <div class="stats-grid" style="margin-bottom:1.5rem">
        <div class="stat-box"><div class="stat-icon">📅</div><div class="stat-num" id="st-total">—</div><div class="stat-label">Всего записей</div></div>
        <div class="stat-box"><div class="stat-icon">⏳</div><div class="stat-num" id="st-pending">—</div><div class="stat-label">Ожидает</div></div>
        <div class="stat-box"><div class="stat-icon">✅</div><div class="stat-num" id="st-confirmed">—</div><div class="stat-label">Подтверждено</div></div>
        <div class="stat-box"><div class="stat-icon">🎯</div><div class="stat-num" id="st-done">—</div><div class="stat-label">Завершено</div></div>
      </div>

      <!-- Appointments -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Мои записи</div>
          <a href="/booking.html" class="btn btn-outline btn-sm">+ Новая запись</a>
        </div>
        <div class="card-body" id="appt-list">
          <div class="loader"><div class="spinner"></div>Загрузка...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Reschedule Modal -->
<div id="reschedule-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:1rem">
  <div style="background:white;border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:420px;box-shadow:var(--shadow-lg)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h3 style="font-size:1.1rem;font-weight:700">Перенести запись</h3>
      <button onclick="closeReschedule()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted)">✕</button>
    </div>
    <div class="form-group" style="margin-bottom:1.25rem">
      <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem">Новая дата</label>
      <input type="date" id="rs-date" style="width:100%;padding:.75rem 1rem;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;box-sizing:border-box">
    </div>
    <div class="form-group" style="margin-bottom:1.5rem">
      <label style="display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem">Доступное время</label>
      <div id="rs-slots" style="display:flex;flex-wrap:wrap;gap:.5rem;min-height:40px">
        <span style="color:var(--text-muted);font-size:.85rem">Выберите дату</span>
      </div>
    </div>
    <div style="display:flex;gap:.75rem">
      <button onclick="closeReschedule()" class="btn btn-outline" style="flex:1">Отмена</button>
      <button onclick="submitReschedule()" class="btn btn-primary" style="flex:1" id="rs-submit-btn" disabled>Перенести</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/mobile.js"></script>
<script src="/js/ux.js"></script>
<script>
if (!API.requireAuth('student')) {}

const user = API.getUser();
if (user) {
  document.getElementById('sb-name').textContent = user.name;
  document.getElementById('sb-avatar').textContent = getInitials(user.name);
  // Join socket room so we get new message notifications
  socket.emit('join_student_chat', user.id);
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Доброе утро' : hour < 17 ? 'Добрый день' : 'Добрый вечер';
  document.getElementById('greeting').textContent = `${greeting}, ${user.name.split(' ')[0]} 👋`;
}

function logout() { API.clearAuth(); window.location.href = '/'; }
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// Real-time updates
const socket = io({ auth: { token: API.getToken() } });
socket.on('slots_updated', () => loadDashboard());

// Chat badge logic — based on unread messages, not just confirmed appts
function updateChatBadge() {
  const badge = document.getElementById('chat-badge');
  if (!badge) return;
  const unread = localStorage.getItem('chat_unread') === '1';
  badge.style.display = unread ? 'inline' : 'none';
  badge.textContent = '●';
}
function clearChatBadge() {
  localStorage.removeItem('chat_unread');
  updateChatBadge();
}

// New message from psychologist → show badge on dashboard
socket.on('new_student_message', (m) => {
  const me = API.getUser();
  // Show badge if message is NOT from the student themselves (i.e., from psychologist)
  if (me && m.sender_id !== me.id) {
    localStorage.setItem('chat_unread', '1');
    updateChatBadge();
    showToast('💬 Новое сообщение от психолога', 'success', 4000);
    pushNotify('AlmauPsych', 'Новое сообщение от психолога');
  }
});

function pushNotify(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon: '/pics/logo.png' });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') new Notification(title, { body, icon: '/pics/logo.png' });
    });
  }
}

async function loadDashboard() {
  try {
    const appts = await API.get('/api/appointments');
    const today = new Date(); today.setHours(0,0,0,0);
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    // Stats
    document.getElementById('st-total').textContent = appts.length;
    document.getElementById('st-pending').textContent = appts.filter(a=>a.status==='pending').length;
    document.getElementById('st-confirmed').textContent = appts.filter(a=>a.status==='confirmed').length;
    document.getElementById('st-done').textContent = appts.filter(a=>a.status==='completed').length;

    // Chat badge — show only if unread messages (set by socket)
    updateChatBadge();

    // Upcoming appointments
    const upcoming = appts
      .filter(a => a.status==='confirmed' || a.status==='pending')
      .filter(a => a.date >= todayStr)
      .sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    const past = appts
      .filter(a => a.date < todayStr || a.status==='completed' || a.status==='cancelled')
      .sort((a,b) => b.date.localeCompare(a.date));

    // Next appointment card
    const nextWrap = document.getElementById('next-appt-wrap');
    if (upcoming.length) {
      const next = upcoming[0];
      const d = formatDate(next.date);
      nextWrap.innerHTML = `
        <div class="next-appt-card">
          <div class="next-appt-date"><div class="day">${d.day}</div><div class="month">${d.month}</div></div>
          <div class="next-appt-info">
            <h3>${next.status==='confirmed'?'Ближайшая сессия':'Запись ожидает подтверждения'}</h3>
            <p>🕐 ${next.time} · Психологический центр AlmaU</p>
            ${next.note?`<p style="margin-top:.35rem;opacity:.7;font-size:.85rem">📝 ${next.note}</p>`:''}
          </div>
          ${next.status==='confirmed'?`<a href="/chat.html" class="btn btn-light btn-sm">💬 Написать</a>`:''}
        </div>`;
    } else { nextWrap.innerHTML=''; }

    // Render list
    const el = document.getElementById('appt-list');
    if (!appts.length) {
      el.innerHTML = `
        <div style="text-align:center;padding:3rem 1rem">
          <div style="font-size:3rem;margin-bottom:1rem">👋</div>
          <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:.5rem">Добро пожаловать в AlmauPsych</h3>
          <p style="color:var(--text-muted);margin-bottom:1.5rem;max-width:360px;margin-left:auto;margin-right:auto">Запишитесь к психологу — это бесплатно и конфиденциально. Первый шаг — выбрать удобное время.</p>
          <a href="/booking.html" class="btn btn-primary">📅 Записаться к психологу</a>
        </div>`;
      return;
    }

    let html = '';

    if (upcoming.length) {
      html += `<div class="section-sep">Предстоящие</div>`;
      html += upcoming.map(a => renderCard(a)).join('');
    }
    if (past.length) {
      html += `<div class="section-sep">История</div>`;
      html += past.map(a => renderCard(a)).join('');
    }
    el.innerHTML = html;
  } catch(e) {
    document.getElementById('appt-list').innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
  }
}

function renderCard(a) {
  const d = formatDate(a.date);
  const colors = {
    pending:   '#f97316',
    confirmed: '#22c55e',
    cancelled: '#f43f5e',
    completed: '#8b5cf6'
  };
  const color = colors[a.status] || '#94a3b8';
  return `
    <div class="appt-card-new">
      <div class="left-bar" style="background:${color}"></div>
      <div class="appt-date-box" style="flex-shrink:0;background:var(--gray-50);border-radius:10px;min-width:56px">
        <div class="day">${d.day}</div><div class="month">${d.month}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:.95rem;margin-bottom:.2rem">${a.psych_name}</div>
        <div style="color:var(--text-muted);font-size:.85rem">🕐 ${a.time}</div>
        ${a.note?`<div style="color:var(--text-muted);font-size:.8rem;margin-top:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📝 ${a.note}</div>`:''}
      </div>
      <span class="status-badge status-${a.status}">${statusLabel(a.status)}</span>
      <div style="display:flex;gap:.5rem;flex-shrink:0;flex-wrap:wrap">
        ${a.status==='confirmed'?`<a href="/chat.html" class="btn btn-success btn-sm" onclick="clearChatBadge()">💬 Чат</a>`:''}
        ${(a.status==='pending'||a.status==='confirmed')?`<button onclick="openReschedule(${a.id})" class="btn btn-outline btn-sm">📅 Перенести</button>`:''}
        ${a.status==='pending'?`<button onclick="cancelAppt(${a.id})" class="btn btn-outline btn-sm" style="color:#dc2626;border-color:#fecaca">Отменить</button>`:''}
      </div>
    </div>`;
}

async function cancelAppt(id) {
  if (!confirm('Отменить запись?')) return;
  await API.patch(`/api/appointments/${id}`, { status: 'cancelled' });
  showToast('Запись отменена');
  loadDashboard();
}

// ── Reschedule ──
let rsApptId = null;
let rsSelectedTime = null;

function openReschedule(apptId) {
  rsApptId = apptId;
  rsSelectedTime = null;
  document.getElementById('rs-submit-btn').disabled = true;
  document.getElementById('rs-slots').innerHTML = '<span style="color:var(--text-muted);font-size:.85rem">Выберите дату</span>';
  // Min date = tomorrow
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const min = tomorrow.toISOString().split('T')[0];
  const dateInput = document.getElementById('rs-date');
  dateInput.min = min; dateInput.value = '';
  const modal = document.getElementById('reschedule-modal');
  modal.style.display = 'flex';
}

function closeReschedule() {
  document.getElementById('reschedule-modal').style.display = 'none';
  rsApptId = null; rsSelectedTime = null;
}

document.getElementById('rs-date').addEventListener('change', async function() {
  const date = this.value;
  if (!date) return;
  const slotsEl = document.getElementById('rs-slots');
  slotsEl.innerHTML = '<span style="color:var(--text-muted);font-size:.85rem">Загрузка...</span>';
  rsSelectedTime = null;
  document.getElementById('rs-submit-btn').disabled = true;
  try {
    const data = await API.get(`/api/available-slots/${date}`);
    if (!data.available?.length) {
      slotsEl.innerHTML = '<span style="color:var(--text-muted);font-size:.85rem">На эту дату нет свободных слотов</span>';
      return;
    }
    slotsEl.innerHTML = data.available.map(t =>
      `<button class="slot-chip" onclick="selectRsTime(this,'${t}')" style="padding:.4rem .85rem;border:1.5px solid var(--gray-200);border-radius:50px;font-size:.85rem;cursor:pointer;background:white;transition:all .15s">${t}</button>`
    ).join('');
  } catch(e) {
    slotsEl.innerHTML = '<span style="color:#dc2626;font-size:.85rem">Ошибка загрузки слотов</span>';
  }
});

function selectRsTime(btn, time) {
  document.querySelectorAll('.slot-chip').forEach(c => {
    c.style.background = 'white'; c.style.borderColor = 'var(--gray-200)'; c.style.color = 'var(--text)';
  });
  btn.style.background = 'var(--plum-500)'; btn.style.borderColor = 'var(--plum-500)'; btn.style.color = 'white';
  rsSelectedTime = time;
  document.getElementById('rs-submit-btn').disabled = false;
}

async function submitReschedule() {
  if (!rsApptId || !rsSelectedTime) return;
  const date = document.getElementById('rs-date').value;
  const btn = document.getElementById('rs-submit-btn');
  btn.classList.add('btn-loading'); btn.disabled = true;
  try {
    await API.patch(`/api/appointments/${rsApptId}/reschedule`, { date, time: rsSelectedTime });
    closeReschedule();
    showToast('Запись перенесена 📅');
    loadDashboard();
  } catch(e) {
    showToast(e.message || 'Ошибка переноса', 'error');
    btn.classList.remove('btn-loading'); btn.disabled = false;
  }
}

// Close modal on backdrop click
document.getElementById('reschedule-modal').addEventListener('click', function(e) {
  if (e.target === this) closeReschedule();
});

loadDashboard();
</script>
</body>
</html>
