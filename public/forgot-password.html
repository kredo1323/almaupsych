<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля — AlmauPsych</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--warm-bg); padding:1rem; }
    .auth-card { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:2.5rem 2rem; width:100%; max-width:420px; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo a { font-size:1.6rem; font-weight:800; color:var(--plum-900); text-decoration:none; font-family:var(--font-heading); }
    .auth-logo a span { color:var(--teal-600); }
    .auth-title { font-size:1.3rem; font-weight:700; margin-bottom:.4rem; text-align:center; }
    .auth-sub { color:var(--text-muted); font-size:.9rem; text-align:center; margin-bottom:1.75rem; line-height:1.5; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-size:.85rem; font-weight:600; margin-bottom:.4rem; color:var(--text); }
    .form-group input { width:100%; padding:.75rem 1rem; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-size:.95rem; font-family:var(--font-body); transition:border .2s; box-sizing:border-box; }
    .form-group input:focus { outline:none; border-color:var(--plum-500); box-shadow:0 0 0 3px rgba(109,79,194,.12); }
    .btn-full { width:100%; padding:.85rem; font-size:1rem; }
    .auth-footer { text-align:center; margin-top:1.5rem; font-size:.87rem; color:var(--text-muted); }
    .auth-footer a { color:var(--plum-500); text-decoration:none; font-weight:600; }
    .success-state { display:none; text-align:center; }
    .success-icon { font-size:3.5rem; margin-bottom:1rem; }
    .success-state h3 { font-size:1.2rem; font-weight:700; margin-bottom:.5rem; }
    .success-state p { color:var(--text-muted); font-size:.9rem; line-height:1.5; }
    #error-msg { color:#dc2626; font-size:.85rem; margin-top:.75rem; display:none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo"><a href="/">AlmauPsych<span>.</span></a></div>

    <div id="form-state">
      <div class="auth-title">Забыли пароль?</div>
      <div class="auth-sub">Введите ваш email — мы пришлём ссылку для сброса пароля</div>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email (@almau.edu.kz)</label>
          <input type="email" id="email" placeholder="student@almau.edu.kz" required autocomplete="email">
        </div>
        <div id="error-msg"></div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Отправить ссылку</button>
      </form>

      <div class="auth-footer">
        <a href="/login.html">← Вернуться ко входу</a>
      </div>
    </div>

    <div class="success-state" id="success-state">
      <div class="success-icon">📬</div>
      <h3>Письмо отправлено!</h3>
      <p>Если такой email зарегистрирован, вы получите письмо со ссылкой для сброса пароля. Проверьте папку «Спам», если письмо не пришло.</p>
      <div style="margin-top:1.75rem">
        <a href="/login.html" class="btn btn-outline">← Вернуться ко входу</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.classList.add('btn-loading'); btn.disabled = true;

      try {
        const email = document.getElementById('email').value.trim();
        await API.post('/api/forgot-password', { email });
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch(err) {
        errEl.textContent = err.message || 'Ошибка — попробуйте снова';
        errEl.style.display = 'block';
        btn.classList.remove('btn-loading'); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
