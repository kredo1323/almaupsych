<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль — AlmauPsych</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--warm-bg); padding:1rem; }
    .auth-card { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:2.5rem 2rem; width:100%; max-width:420px; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo a { font-size:1.6rem; font-weight:800; color:var(--plum-900); text-decoration:none; font-family:var(--font-heading); }
    .auth-logo a span { color:var(--teal-600); }
    .auth-title { font-size:1.3rem; font-weight:700; margin-bottom:.4rem; text-align:center; }
    .auth-sub { color:var(--text-muted); font-size:.9rem; text-align:center; margin-bottom:1.75rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-size:.85rem; font-weight:600; margin-bottom:.4rem; }
    .form-group input { width:100%; padding:.75rem 1rem; border:1.5px solid var(--gray-200); border-radius:var(--radius); font-size:.95rem; font-family:var(--font-body); transition:border .2s; box-sizing:border-box; }
    .form-group input:focus { outline:none; border-color:var(--plum-500); box-shadow:0 0 0 3px rgba(109,79,194,.12); }
    .password-hint { font-size:.78rem; color:var(--text-muted); margin-top:.35rem; }
    .btn-full { width:100%; padding:.85rem; font-size:1rem; }
    #error-msg { color:#dc2626; font-size:.85rem; margin-top:.75rem; display:none; }
    .success-state { display:none; text-align:center; }
    .success-icon { font-size:3.5rem; margin-bottom:1rem; }
    .invalid-state { display:none; text-align:center; }
    .invalid-icon { font-size:3.5rem; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo"><a href="/">AlmauPsych<span>.</span></a></div>

    <!-- Loading -->
    <div id="loading-state" style="text-align:center;padding:2rem 0">
      <div class="spinner" style="margin:0 auto 1rem"></div>
      <p style="color:var(--text-muted)">Проверяем ссылку...</p>
    </div>

    <!-- Invalid token -->
    <div class="invalid-state" id="invalid-state">
      <div class="invalid-icon">⚠️</div>
      <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:.5rem">Ссылка недействительна</h3>
      <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem">Эта ссылка уже использована или истекла. Запросите новую.</p>
      <a href="/forgot-password.html" class="btn btn-primary">Запросить новую ссылку</a>
    </div>

    <!-- Form -->
    <div id="form-state" style="display:none">
      <div class="auth-title">Новый пароль</div>
      <div class="auth-sub">Придумайте надёжный пароль</div>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">Новый пароль</label>
          <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6" autocomplete="new-password">
          <div class="password-hint">Минимум 6 символов</div>
        </div>
        <div class="form-group">
          <label for="password2">Повторите пароль</label>
          <input type="password" id="password2" placeholder="Повторите пароль" required autocomplete="new-password">
        </div>
        <div id="error-msg"></div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Сохранить пароль</button>
      </form>
    </div>

    <!-- Success -->
    <div class="success-state" id="success-state">
      <div class="success-icon">✅</div>
      <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:.5rem">Пароль обновлён!</h3>
      <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem">Теперь вы можете войти с новым паролем.</p>
      <a href="/login.html" class="btn btn-primary">Войти</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    // If no token in URL — show invalid immediately
    if (!token) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    } else {
      // Token present — show form
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('form-state').style.display = 'block';
    }

    document.getElementById('reset-form')?.addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password !== password2) {
        errEl.textContent = 'Пароли не совпадают';
        errEl.style.display = 'block';
        return;
      }

      btn.classList.add('btn-loading'); btn.disabled = true;
      try {
        await API.post('/api/reset-password', { token, password });
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch(err) {
        errEl.textContent = err.message || 'Ошибка — попробуйте снова';
        errEl.style.display = 'block';
        btn.classList.remove('btn-loading'); btn.disabled = false;
        // If token invalid, show invalid state
        if (err.message?.includes('недействительна') || err.message?.includes('истекла')) {
          document.getElementById('form-state').style.display = 'none';
          document.getElementById('invalid-state').style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
